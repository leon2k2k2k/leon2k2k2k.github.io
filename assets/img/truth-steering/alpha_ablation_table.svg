<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Truth steering alpha ablation table</title>
  <desc id="desc">A stylized table showing deceptive score and stability across steering strengths for Qwen2.5-14B.</desc>
  <rect width="960" height="540" fill="#f7f8fb"/>
  <rect x="32" y="28" width="896" height="484" rx="16" fill="#ffffff" stroke="#d6dbe5"/>
  <text x="64" y="72" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#172033">Qwen2.5-14B steering sweep</text>
  <text x="64" y="105" font-family="Inter, Arial, sans-serif" font-size="17" fill="#5b667a">Deceptive score: lower is better for positive steering; higher is more deceptive.</text>

  <g font-family="Inter, Arial, sans-serif" font-size="17">
    <rect x="64" y="136" width="832" height="42" rx="8" fill="#eef2f7"/>
    <text x="88" y="163" font-weight="700" fill="#243047">alpha</text>
    <text x="230" y="163" font-weight="700" fill="#243047">deceptive mean</text>
    <text x="448" y="163" font-weight="700" fill="#243047">median</text>
    <text x="604" y="163" font-weight="700" fill="#243047">stability</text>
    <text x="760" y="163" font-weight="700" fill="#243047">incoherence</text>

    <g fill="#1f2937">
      <rect x="64" y="186" width="832" height="38" fill="#fff5f5"/>
      <text x="88" y="211">-6</text><text x="260" y="211">7.27</text><text x="470" y="211">9.0</text><text x="630" y="211">5.62</text><text x="790" y="211">28.9%</text>

      <rect x="64" y="224" width="832" height="38" fill="#fffafa"/>
      <text x="88" y="249">-5</text><text x="260" y="249">8.16</text><text x="470" y="249">10.0</text><text x="630" y="249">7.24</text><text x="790" y="249">26.7%</text>

      <rect x="64" y="262" width="832" height="38" fill="#fff5f5"/>
      <text x="88" y="287">-4</text><text x="260" y="287">8.16</text><text x="470" y="287">10.0</text><text x="630" y="287">8.24</text><text x="790" y="287">8.9%</text>

      <rect x="64" y="300" width="832" height="42" fill="#ffe7e7" stroke="#e46a6a"/>
      <text x="88" y="327" font-weight="700">-3</text><text x="260" y="327" font-weight="700">8.73</text><text x="470" y="327" font-weight="700">10.0</text><text x="630" y="327" font-weight="700">9.11</text><text x="790" y="327" font-weight="700">2.2%</text>

      <rect x="64" y="342" width="832" height="38" fill="#f8fbff"/>
      <text x="88" y="367">0</text><text x="260" y="367">6.02</text><text x="470" y="367">8.0</text><text x="630" y="367">9.33</text><text x="790" y="367">0.0%</text>

      <rect x="64" y="380" width="832" height="38" fill="#f3fff7"/>
      <text x="88" y="405">+4</text><text x="260" y="405">2.13</text><text x="470" y="405">0.0</text><text x="630" y="405">9.53</text><text x="790" y="405">0.0%</text>

      <rect x="64" y="418" width="832" height="42" fill="#e8f8ed" stroke="#4ea66a"/>
      <text x="88" y="445" font-weight="700">+5</text><text x="260" y="445" font-weight="700">1.82</text><text x="470" y="445" font-weight="700">0.0</text><text x="630" y="445" font-weight="700">9.53</text><text x="790" y="445" font-weight="700">2.2%</text>
    </g>
  </g>

  <text x="64" y="492" font-family="Inter, Arial, sans-serif" font-size="16" fill="#5b667a">Selected rows from the 45-example roleplay sweep. Positive steering moves toward disclosure; negative steering moves toward deception.</text>
</svg>
